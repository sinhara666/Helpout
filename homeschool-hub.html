<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LearnLab — Homeschool Game Hub</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0d1a;
    --card: #151528;
    --card2: #1a1a35;
    --accent1: #ff6b6b;
    --accent2: #ffd93d;
    --accent3: #6bcb77;
    --accent4: #4d96ff;
    --accent5: #c77dff;
    --text: #f0f0ff;
    --muted: #8888aa;
    --radius: 18px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Nunito', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* STARS BG */
  body::before {
    content: '';
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background-image:
      radial-gradient(1px 1px at 10% 15%, #fff6 0%, transparent 100%),
      radial-gradient(1px 1px at 30% 45%, #fff4 0%, transparent 100%),
      radial-gradient(1px 1px at 55% 20%, #fff5 0%, transparent 100%),
      radial-gradient(1px 1px at 75% 60%, #fff3 0%, transparent 100%),
      radial-gradient(1px 1px at 90% 35%, #fff6 0%, transparent 100%),
      radial-gradient(1px 1px at 20% 75%, #fff4 0%, transparent 100%),
      radial-gradient(1px 1px at 45% 85%, #fff3 0%, transparent 100%),
      radial-gradient(1px 1px at 65% 90%, #fff5 0%, transparent 100%),
      radial-gradient(2px 2px at 5% 50%, #fff2 0%, transparent 100%),
      radial-gradient(2px 2px at 85% 80%, #fff2 0%, transparent 100%);
    pointer-events: none; z-index: 0;
  }

  #app { position: relative; z-index: 1; }

  /* HEADER */
  header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 20px 30px;
    background: rgba(21,21,40,0.9);
    backdrop-filter: blur(10px);
    border-bottom: 2px solid #ffffff10;
    position: sticky; top: 0; z-index: 100;
  }
  .logo {
    font-family: 'Fredoka One', cursive;
    font-size: 2rem;
    background: linear-gradient(135deg, var(--accent2), var(--accent1));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  .header-btns { display: flex; gap: 10px; }
  .btn {
    padding: 9px 20px;
    border-radius: 50px;
    border: none; cursor: pointer;
    font-family: 'Nunito', sans-serif;
    font-weight: 800; font-size: 0.9rem;
    transition: all 0.2s;
  }
  .btn:hover { transform: translateY(-2px); filter: brightness(1.15); }
  .btn-teacher { background: var(--accent5); color: #fff; }
  .btn-primary { background: var(--accent2); color: #1a1a00; }
  .btn-ghost { background: transparent; border: 2px solid #ffffff30; color: var(--text); }
  .btn-danger { background: var(--accent1); color: #fff; }
  .btn-success { background: var(--accent3); color: #000; }

  /* SCREENS */
  .screen { display: none; padding: 30px; max-width: 900px; margin: 0 auto; }
  .screen.active { display: block; }

  /* HOME */
  .hero { text-align: center; padding: 40px 20px 20px; }
  .hero h1 {
    font-family: 'Fredoka One', cursive;
    font-size: clamp(2.5rem, 6vw, 4rem);
    line-height: 1.1;
    background: linear-gradient(135deg, var(--accent4), var(--accent5), var(--accent1));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  .hero p { color: var(--muted); font-size: 1.1rem; margin-top: 10px; }

  /* AGE SELECTOR */
  .section-title {
    font-family: 'Fredoka One', cursive;
    font-size: 1.5rem;
    margin: 30px 0 15px;
    color: var(--accent2);
  }
  .age-grid { display: flex; gap: 12px; flex-wrap: wrap; }
  .age-chip {
    padding: 10px 22px;
    border-radius: 50px;
    background: var(--card2);
    border: 2px solid transparent;
    cursor: pointer;
    font-weight: 800;
    font-size: 0.95rem;
    transition: all 0.2s;
  }
  .age-chip:hover, .age-chip.active {
    border-color: var(--accent4);
    background: rgba(77,150,255,0.15);
    color: var(--accent4);
  }

  /* GAME CARDS */
  .games-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
    gap: 18px;
    margin-top: 10px;
  }
  .game-card {
    background: var(--card);
    border-radius: var(--radius);
    padding: 24px;
    cursor: pointer;
    border: 2px solid transparent;
    transition: all 0.25s;
    position: relative;
    overflow: hidden;
  }
  .game-card::before {
    content: '';
    position: absolute; top: 0; left: 0; right: 0; height: 4px;
    background: var(--card-color, var(--accent4));
  }
  .game-card:hover {
    border-color: var(--card-color, var(--accent4));
    transform: translateY(-4px);
    box-shadow: 0 10px 30px rgba(0,0,0,0.4);
  }
  .game-card .emoji { font-size: 2.5rem; margin-bottom: 12px; }
  .game-card h3 { font-size: 1.2rem; font-weight: 800; margin-bottom: 6px; }
  .game-card p { color: var(--muted); font-size: 0.85rem; }
  .game-card .ages-tag {
    display: inline-block;
    margin-top: 10px;
    padding: 3px 10px;
    border-radius: 50px;
    background: rgba(255,255,255,0.07);
    font-size: 0.75rem;
    color: var(--muted);
  }

  /* TEACHER PANEL */
  .teacher-panel {
    background: var(--card);
    border-radius: var(--radius);
    padding: 28px;
    border: 2px solid var(--accent5);
    margin-bottom: 20px;
  }
  .teacher-panel h2 {
    font-family: 'Fredoka One', cursive;
    font-size: 1.6rem;
    color: var(--accent5);
    margin-bottom: 20px;
  }
  .form-group { margin-bottom: 16px; }
  .form-group label { display: block; font-weight: 700; margin-bottom: 6px; font-size: 0.9rem; color: var(--muted); }
  .form-group input, .form-group select, .form-group textarea {
    width: 100%;
    padding: 11px 14px;
    background: var(--card2);
    border: 2px solid #ffffff15;
    border-radius: 10px;
    color: var(--text);
    font-family: 'Nunito', sans-serif;
    font-size: 0.95rem;
    outline: none;
    transition: border-color 0.2s;
  }
  .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
    border-color: var(--accent5);
  }
  .form-group textarea { height: 100px; resize: vertical; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

  /* GAME SCREEN */
  .game-header {
    display: flex; align-items: center; gap: 15px; margin-bottom: 30px;
  }
  .game-title {
    font-family: 'Fredoka One', cursive;
    font-size: 2rem;
    flex: 1;
  }
  .score-box {
    background: var(--card2);
    border-radius: 12px;
    padding: 8px 18px;
    font-weight: 800;
    font-size: 1.1rem;
  }
  .score-box span { color: var(--accent2); }

  /* QUIZ GAME */
  .question-box {
    background: var(--card);
    border-radius: var(--radius);
    padding: 30px;
    margin-bottom: 20px;
    border-left: 5px solid var(--accent4);
    font-size: 1.3rem;
    font-weight: 700;
    line-height: 1.5;
  }
  .options-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 20px;
  }
  .option-btn {
    background: var(--card2);
    border: 2px solid #ffffff15;
    border-radius: 14px;
    padding: 18px;
    cursor: pointer;
    font-family: 'Nunito', sans-serif;
    font-weight: 700;
    font-size: 1rem;
    color: var(--text);
    transition: all 0.2s;
    text-align: left;
  }
  .option-btn:hover:not(:disabled) {
    border-color: var(--accent4);
    background: rgba(77,150,255,0.1);
  }
  .option-btn.correct { border-color: var(--accent3); background: rgba(107,203,119,0.15); }
  .option-btn.wrong { border-color: var(--accent1); background: rgba(255,107,107,0.15); }

  /* WORD SCRAMBLE */
  .scrambled-word {
    font-family: 'Fredoka One', cursive;
    font-size: clamp(2rem, 6vw, 4rem);
    text-align: center;
    letter-spacing: 0.2em;
    color: var(--accent2);
    margin: 30px 0;
    padding: 30px;
    background: var(--card);
    border-radius: var(--radius);
  }
  .word-input {
    width: 100%;
    padding: 16px 20px;
    font-size: 1.5rem;
    text-align: center;
    font-family: 'Fredoka One', cursive;
    letter-spacing: 0.15em;
    background: var(--card2);
    border: 3px solid var(--accent4);
    border-radius: 14px;
    color: var(--text);
    outline: none;
    margin-bottom: 15px;
  }
  .word-input:focus { border-color: var(--accent2); }

  /* MATH GAME */
  .math-problem {
    font-family: 'Fredoka One', cursive;
    font-size: clamp(3rem, 8vw, 6rem);
    text-align: center;
    color: var(--accent3);
    margin: 20px 0;
  }
  .math-input {
    display: block;
    width: 200px;
    margin: 0 auto 20px;
    padding: 16px;
    font-size: 2rem;
    text-align: center;
    font-family: 'Fredoka One', cursive;
    background: var(--card2);
    border: 3px solid var(--accent3);
    border-radius: 14px;
    color: var(--text);
    outline: none;
  }

  /* MEMORY MATCH */
  .memory-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
    max-width: 500px;
    margin: 0 auto;
  }
  .memory-card {
    aspect-ratio: 1;
    background: var(--card2);
    border-radius: 12px;
    border: 2px solid #ffffff10;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.8rem;
    transition: all 0.3s;
    user-select: none;
    position: relative;
    overflow: hidden;
  }
  .memory-card .front { display: none; }
  .memory-card .back { font-size: 2rem; }
  .memory-card.flipped { background: var(--card); border-color: var(--accent4); }
  .memory-card.flipped .front { display: flex; flex-direction: column; align-items: center; font-size: 0.85rem; font-weight: 800; gap: 4px; }
  .memory-card.flipped .back { display: none; }
  .memory-card.matched { border-color: var(--accent3); background: rgba(107,203,119,0.15); }
  .memory-card:hover:not(.matched):not(.flipped) { transform: scale(1.05); border-color: #ffffff30; }

  /* FEEDBACK */
  .feedback {
    text-align: center;
    font-family: 'Fredoka One', cursive;
    font-size: 1.8rem;
    padding: 20px;
    border-radius: var(--radius);
    margin: 15px 0;
    animation: pop 0.3s ease;
  }
  .feedback.correct-fb { background: rgba(107,203,119,0.2); color: var(--accent3); }
  .feedback.wrong-fb { background: rgba(255,107,107,0.2); color: var(--accent1); }
  @keyframes pop { 0% { transform: scale(0.8); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }

  /* PROGRESS BAR */
  .progress-bar {
    background: var(--card2);
    border-radius: 50px;
    height: 10px;
    margin-bottom: 20px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent4), var(--accent5));
    border-radius: 50px;
    transition: width 0.4s ease;
  }

  /* RESULTS */
  .results-box {
    text-align: center;
    padding: 40px;
    background: var(--card);
    border-radius: var(--radius);
  }
  .results-box .big-score {
    font-family: 'Fredoka One', cursive;
    font-size: 5rem;
    background: linear-gradient(135deg, var(--accent2), var(--accent1));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  .results-box p { color: var(--muted); margin: 10px 0 25px; font-size: 1.1rem; }

  /* HINT */
  .hint-box {
    background: rgba(255,217,61,0.1);
    border-left: 4px solid var(--accent2);
    border-radius: 10px;
    padding: 12px 16px;
    font-size: 0.9rem;
    color: var(--accent2);
    margin-bottom: 15px;
  }

  /* NAV TABS */
  .subject-tabs {
    display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 20px;
  }
  .subject-tab {
    padding: 8px 18px;
    border-radius: 50px;
    background: var(--card2);
    border: 2px solid transparent;
    cursor: pointer;
    font-weight: 700;
    font-size: 0.85rem;
    transition: all 0.2s;
    color: var(--muted);
  }
  .subject-tab.active { border-color: var(--accent1); color: var(--accent1); background: rgba(255,107,107,0.1); }

  /* TIMER */
  .timer-ring {
    text-align: center;
    font-family: 'Fredoka One', cursive;
    font-size: 2.5rem;
    color: var(--accent1);
    margin-bottom: 10px;
  }

  /* TOAST */
  .toast {
    position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
    background: var(--accent3); color: #000;
    padding: 12px 24px; border-radius: 50px;
    font-weight: 800; font-size: 0.95rem;
    z-index: 9999; opacity: 0; transition: opacity 0.3s;
    pointer-events: none;
  }
  .toast.show { opacity: 1; }

  @media (max-width: 600px) {
    .options-grid { grid-template-columns: 1fr; }
    .form-row { grid-template-columns: 1fr; }
    .memory-grid { grid-template-columns: repeat(3, 1fr); }
  }
</style>
</head>
<body>
<div id="app">

<header>
  <div class="logo">🎓 LearnLab</div>
  <div class="header-btns">
    <button class="btn btn-ghost" onclick="goHome()">🏠 Home</button>
    <button class="btn btn-teacher" onclick="showScreen('teacher')">🔑 Teacher</button>
  </div>
</header>

<!-- HOME SCREEN -->
<div id="screen-home" class="screen active">
  <div class="hero">
    <h1>Learn Through Play</h1>
    <p>Pick a game. Earn stars. Actually have fun.</p>
  </div>

  <div class="section-title">📚 Filter by Age</div>
  <div class="age-grid">
    <div class="age-chip active" onclick="filterAge('all', this)">All Ages</div>
    <div class="age-chip" onclick="filterAge('K2', this)">K-2 (5-7)</div>
    <div class="age-chip" onclick="filterAge('35', this)">3-5 (8-10)</div>
    <div class="age-chip" onclick="filterAge('68', this)">6-8 (11-13)</div>
  </div>

  <div class="section-title">🎮 Choose a Game</div>
  <div class="games-grid" id="games-grid"></div>
</div>

<!-- TEACHER PANEL -->
<div id="screen-teacher" class="screen">
  <div class="teacher-panel">
    <h2>🔑 Teacher Content Editor</h2>

    <div class="form-row">
      <div class="form-group">
        <label>Subject</label>
        <select id="t-subject">
          <option value="spelling">Reading / Spelling</option>
          <option value="math">Math</option>
          <option value="science">Science</option>
          <option value="history">History / Social Studies</option>
        </select>
      </div>
      <div class="form-group">
        <label>Age Group</label>
        <select id="t-age">
          <option value="K2">K-2 (Ages 5-7)</option>
          <option value="35">3-5 (Ages 8-10)</option>
          <option value="68">6-8 (Ages 11-13)</option>
        </select>
      </div>
    </div>

    <div id="t-spelling-section">
      <div class="form-group">
        <label>Spelling / Vocabulary Words (one per line)</label>
        <textarea id="t-words" placeholder="cat&#10;dog&#10;elephant&#10;butterfly"></textarea>
      </div>
    </div>

    <div id="t-quiz-section" style="display:none">
      <div class="form-group">
        <label>Quiz Questions (format: Question | CorrectAnswer | Wrong1 | Wrong2 | Wrong3)</label>
        <textarea id="t-questions" style="height:160px" placeholder="What is 2+2? | 4 | 3 | 5 | 6&#10;What planet is closest to the Sun? | Mercury | Venus | Earth | Mars"></textarea>
      </div>
    </div>

    <button class="btn btn-success" onclick="saveTeacherContent()" style="width:100%;padding:14px;font-size:1rem;">💾 Save Content</button>
  </div>

  <div class="section-title" style="color:var(--accent4)">📋 Saved Content Sets</div>
  <div id="saved-sets"></div>
</div>

<!-- GAME SCREENS -->
<div id="screen-game" class="screen">
  <div id="game-container"></div>
</div>

</div>

<div class="toast" id="toast"></div>

<script>
// ===== STATE =====
let state = {
  score: 0,
  currentGame: null,
  ageFilter: 'all',
  teacherContent: JSON.parse(localStorage.getItem('ll_content') || '{}'),
  gameData: null,
  answers: [],
  timer: null
};

// ===== GAME DEFINITIONS =====
const GAMES = [
  { id: 'word-scramble', title: 'Word Scramble', emoji: '🔀', desc: 'Unscramble the letters before time runs out!', subject: 'spelling', ages: ['K2','35','68'], color: '#ff6b6b' },
  { id: 'spelling-quiz', title: 'Spelling Bee', emoji: '🐝', desc: 'Read the definition — type the word!', subject: 'spelling', ages: ['35','68'], color: '#ffd93d' },
  { id: 'math-blaster', title: 'Math Blaster', emoji: '🚀', desc: 'Race to answer math problems!', subject: 'math', ages: ['K2','35','68'], color: '#6bcb77' },
  { id: 'memory-match', title: 'Memory Match', emoji: '🃏', desc: 'Match pairs — words to definitions or math facts!', subject: 'spelling', ages: ['K2','35'], color: '#4d96ff' },
  { id: 'trivia', title: 'Science Trivia', emoji: '🔬', desc: 'How much do you know about the world around you?', subject: 'science', ages: ['35','68'], color: '#c77dff' },
  { id: 'history-quest', title: 'History Quest', emoji: '🏛️', desc: 'Explore events, people, and places through history!', subject: 'history', ages: ['35','68'], color: '#ff9a3c' },
  { id: 'number-pop', title: 'Number Pop', emoji: '💥', desc: 'Pop the bubbles with the right answer!', subject: 'math', ages: ['K2'], color: '#ff6b9d' },
  { id: 'word-builder', title: 'Word Builder', emoji: '🧱', desc: 'Build words from letter tiles — how many can you make?', subject: 'spelling', ages: ['K2','35'], color: '#00d4aa' },
];

// ===== DEFAULT CONTENT =====
const DEFAULTS = {
  spelling: {
    K2: ['cat','dog','hat','run','big','sun','hop','wet','fun','red','bed','map','cup','dig','log'],
    '35': ['friend','library','because','together','mountain','beautiful','adventure','discover','science','history'],
    '68': ['accommodate','arithmetic','conscience','environment','hypothesis','medieval','perseverance','synonym','civilization','consequence']
  },
  math: {
    K2: [{q:'2 + 3',a:5},{q:'4 + 1',a:5},{q:'3 + 3',a:6},{q:'5 + 2',a:7},{q:'1 + 4',a:5},{q:'6 + 2',a:8},{q:'3 + 4',a:7},{q:'2 + 6',a:8}],
    '35': [{q:'12 × 4',a:48},{q:'63 ÷ 7',a:9},{q:'25 + 48',a:73},{q:'100 - 37',a:63},{q:'8 × 9',a:72},{q:'144 ÷ 12',a:12},{q:'56 + 79',a:135},{q:'7 × 8',a:56}],
    '68': [{q:'√144',a:12},{q:'3²',a:9},{q:'15% of 80',a:12},{q:'2³',a:8},{q:'√225',a:15},{q:'4²',a:16},{q:'25% of 60',a:15},{q:'5²',a:25}]
  },
  science: {
    all: [
      {q:'What gas do plants absorb from the air?',a:'Carbon Dioxide',w:['Oxygen','Nitrogen','Hydrogen']},
      {q:'What is the powerhouse of the cell?',a:'Mitochondria',w:['Nucleus','Ribosome','Cell Wall']},
      {q:'How many bones are in the adult human body?',a:'206',w:['180','250','300']},
      {q:'What planet is known as the Red Planet?',a:'Mars',w:['Venus','Jupiter','Saturn']},
      {q:'What force keeps us on the ground?',a:'Gravity',w:['Magnetism','Friction','Tension']},
      {q:'What is H₂O?',a:'Water',w:['Oxygen','Hydrogen Peroxide','Salt Water']},
      {q:'How long does it take Earth to orbit the Sun?',a:'365 days',w:['30 days','24 hours','100 days']},
      {q:'What is the largest organ in the human body?',a:'Skin',w:['Liver','Brain','Heart']},
    ]
  },
  history: {
    all: [
      {q:'In what year did the United States declare independence?',a:'1776',w:['1492','1812','1865']},
      {q:'Who was the first President of the United States?',a:'George Washington',w:['Abraham Lincoln','Thomas Jefferson','John Adams']},
      {q:'What ancient wonder was located in Alexandria, Egypt?',a:'The Great Library',w:['The Colosseum','The Parthenon','The Great Wall']},
      {q:'What year did World War II end?',a:'1945',w:['1939','1941','1950']},
      {q:'Who wrote the Declaration of Independence?',a:'Thomas Jefferson',w:['Benjamin Franklin','John Adams','George Washington']},
      {q:'Which civilization built the pyramids at Giza?',a:'Ancient Egyptians',w:['Romans','Greeks','Mesopotamians']},
      {q:'What was the name of the ship that brought the Pilgrims to America?',a:'Mayflower',w:['Santa Maria','HMS Victory','Endeavour']},
      {q:'Who was the first woman to win a Nobel Prize?',a:'Marie Curie',w:['Rosa Parks','Florence Nightingale','Amelia Earhart']},
    ]
  }
};

// ===== RENDER HOME =====
function renderHome() {
  const grid = document.getElementById('games-grid');
  const filter = state.ageFilter;
  const visible = GAMES.filter(g => filter === 'all' || g.ages.includes(filter));
  grid.innerHTML = visible.map(g => `
    <div class="game-card" style="--card-color:${g.color}" onclick="startGame('${g.id}')">
      <div class="emoji">${g.emoji}</div>
      <h3>${g.title}</h3>
      <p>${g.desc}</p>
      <div class="ages-tag">${g.ages.join(' · ')}</div>
    </div>
  `).join('');
}

function filterAge(age, el) {
  state.ageFilter = age;
  document.querySelectorAll('.age-chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  renderHome();
}

// ===== SCREENS =====
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-' + id).classList.add('active');
  if (id === 'teacher') renderSavedSets();
}
function goHome() {
  clearInterval(state.timer);
  state.score = 0;
  showScreen('home');
  renderHome();
}

// ===== TEACHER =====
document.getElementById('t-subject').addEventListener('change', function() {
  const isSpelling = ['spelling'].includes(this.value);
  document.getElementById('t-spelling-section').style.display = isSpelling ? '' : 'none';
  document.getElementById('t-quiz-section').style.display = isSpelling ? 'none' : '';
});

function saveTeacherContent() {
  const subject = document.getElementById('t-subject').value;
  const age = document.getElementById('t-age').value;
  const key = subject + '_' + age;

  if (['math','science','history'].includes(subject)) {
    const raw = document.getElementById('t-questions').value.trim();
    if (!raw) { showToast('Add some questions first!'); return; }
    const questions = raw.split('\n').filter(Boolean).map(line => {
      const parts = line.split('|').map(s => s.trim());
      return { q: parts[0], a: parts[1], w: [parts[2], parts[3], parts[4]].filter(Boolean) };
    });
    state.teacherContent[key] = { type: 'quiz', questions };
  } else {
    const words = document.getElementById('t-words').value.trim().split('\n').filter(Boolean).map(w => w.trim());
    if (!words.length) { showToast('Add some words first!'); return; }
    state.teacherContent[key] = { type: 'words', words };
  }

  localStorage.setItem('ll_content', JSON.stringify(state.teacherContent));
  showToast('✅ Content saved!');
  renderSavedSets();
}

function renderSavedSets() {
  const el = document.getElementById('saved-sets');
  const keys = Object.keys(state.teacherContent);
  if (!keys.length) { el.innerHTML = '<p style="color:var(--muted)">No custom content yet.</p>'; return; }
  el.innerHTML = keys.map(k => {
    const d = state.teacherContent[k];
    const count = d.words ? d.words.length : d.questions.length;
    return `<div style="background:var(--card);border-radius:12px;padding:14px 18px;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center">
      <div><b>${k.replace('_',' › ')}</b> <span style="color:var(--muted);font-size:0.85rem">${count} items</span></div>
      <button class="btn btn-danger" style="padding:6px 14px;font-size:0.8rem" onclick="deleteContent('${k}')">🗑</button>
    </div>`;
  }).join('');
}

function deleteContent(key) {
  delete state.teacherContent[key];
  localStorage.setItem('ll_content', JSON.stringify(state.teacherContent));
  renderSavedSets();
}

// ===== START GAME =====
function startGame(gameId) {
  state.currentGame = gameId;
  state.score = 0;
  state.answers = [];
  clearInterval(state.timer);
  showScreen('game');

  switch(gameId) {
    case 'word-scramble': playWordScramble(); break;
    case 'math-blaster': playMathBlaster(); break;
    case 'memory-match': playMemoryMatch(); break;
    case 'trivia': playTrivia('science'); break;
    case 'history-quest': playTrivia('history'); break;
    case 'spelling-quiz': playSpellingQuiz(); break;
    case 'number-pop': playNumberPop(); break;
    case 'word-builder': playWordBuilder(); break;
  }
}

// ===== UTILS =====
function shuffle(arr) { return [...arr].sort(() => Math.random()-0.5); }
function getWords(ageKey) {
  const key = 'spelling_' + ageKey;
  if (state.teacherContent[key]) return state.teacherContent[key].words;
  return DEFAULTS.spelling[ageKey] || DEFAULTS.spelling['35'];
}
function getMathProblems(ageKey) {
  return DEFAULTS.math[ageKey] || DEFAULTS.math['35'];
}
function getQuizQ(subject) {
  const ages = ['K2','35','68'];
  for (const age of ages) {
    const key = subject + '_' + age;
    if (state.teacherContent[key]) return state.teacherContent[key].questions;
  }
  return DEFAULTS[subject]?.all || DEFAULTS.science.all;
}
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}
function html(gc) { document.getElementById('game-container').innerHTML = gc; }

// ===== WORD SCRAMBLE =====
function playWordScramble() {
  const ageKey = state.ageFilter === 'all' ? '35' : state.ageFilter;
  const words = shuffle(getWords(ageKey));
  let idx = 0, timeLeft = 30;

  function render() {
    if (idx >= Math.min(words.length, 10)) { showResults(); return; }
    const word = words[idx];
    const scrambled = shuffle(word.split('')).join('');
    clearInterval(state.timer);
    timeLeft = 30;

    html(`
      <div class="game-header">
        <button class="btn btn-ghost" onclick="goHome()">← Back</button>
        <div class="game-title">🔀 Word Scramble</div>
        <div class="score-box">⭐ <span>${state.score}</span></div>
      </div>
      <div class="progress-bar"><div class="progress-fill" style="width:${(idx/10)*100}%"></div></div>
      <div class="timer-ring" id="timer-disp">${timeLeft}s</div>
      <div class="hint-box">💡 Unscramble the word below!</div>
      <div class="scrambled-word" id="scr-word">${scrambled.toUpperCase()}</div>
      <input class="word-input" id="word-ans" placeholder="Type your answer..." autofocus
        onkeydown="if(event.key==='Enter')checkScramble('${word}')">
      <div style="text-align:center;display:flex;gap:10px;justify-content:center">
        <button class="btn btn-primary" onclick="checkScramble('${word}')">✅ Check</button>
        <button class="btn btn-ghost" onclick="skipScramble('${word}')">⏩ Skip</button>
      </div>
      <div id="fb"></div>
    `);

    state.timer = setInterval(() => {
      timeLeft--;
      const td = document.getElementById('timer-disp');
      if (td) td.textContent = timeLeft + 's';
      if (timeLeft <= 0) { clearInterval(state.timer); skipScramble(word); }
    }, 1000);
  }

  window.checkScramble = function(word) {
    const ans = (document.getElementById('word-ans')?.value || '').trim().toLowerCase();
    clearInterval(state.timer);
    if (ans === word.toLowerCase()) {
      state.score += 10 + Math.floor(timeLeft/3);
      document.getElementById('fb').innerHTML = '<div class="feedback correct-fb">🎉 Correct! +' + (10+Math.floor(timeLeft/3)) + '</div>';
    } else {
      document.getElementById('fb').innerHTML = `<div class="feedback wrong-fb">❌ It was: <b>${word}</b></div>`;
    }
    idx++;
    setTimeout(render, 1200);
  };
  window.skipScramble = function(word) {
    clearInterval(state.timer);
    document.getElementById('fb').innerHTML = `<div class="feedback wrong-fb">⏩ Answer: <b>${word}</b></div>`;
    idx++;
    setTimeout(render, 1200);
  };

  render();
}

// ===== MATH BLASTER =====
function playMathBlaster() {
  const ageKey = state.ageFilter === 'all' ? '35' : state.ageFilter;
  const problems = shuffle(getMathProblems(ageKey));
  let idx = 0;

  function render() {
    if (idx >= Math.min(problems.length, 8)) { showResults(); return; }
    const p = problems[idx];
    html(`
      <div class="game-header">
        <button class="btn btn-ghost" onclick="goHome()">← Back</button>
        <div class="game-title">🚀 Math Blaster</div>
        <div class="score-box">⭐ <span>${state.score}</span></div>
      </div>
      <div class="progress-bar"><div class="progress-fill" style="width:${(idx/8)*100}%"></div></div>
      <div class="math-problem">${p.q} = ?</div>
      <input class="math-input" id="math-ans" type="number" placeholder="?" autofocus
        onkeydown="if(event.key==='Enter')checkMath(${p.a})">
      <div style="text-align:center">
        <button class="btn btn-primary" onclick="checkMath(${p.a})">🚀 Submit</button>
      </div>
      <div id="fb"></div>
    `);
  }

  window.checkMath = function(answer) {
    const ans = parseInt(document.getElementById('math-ans')?.value);
    if (ans === answer) {
      state.score += 15;
      document.getElementById('fb').innerHTML = '<div class="feedback correct-fb">🚀 Correct! +15</div>';
    } else {
      document.getElementById('fb').innerHTML = `<div class="feedback wrong-fb">❌ Answer was: <b>${answer}</b></div>`;
    }
    idx++;
    setTimeout(render, 1200);
  };

  render();
}

// ===== TRIVIA (Science / History) =====
function playTrivia(subject) {
  const questions = shuffle(getQuizQ(subject));
  let idx = 0;

  function render() {
    if (idx >= Math.min(questions.length, 8)) { showResults(); return; }
    const q = questions[idx];
    const opts = shuffle([q.a, ...q.w]);
    html(`
      <div class="game-header">
        <button class="btn btn-ghost" onclick="goHome()">← Back</button>
        <div class="game-title">${subject==='science'?'🔬 Science':'🏛️ History'}</div>
        <div class="score-box">⭐ <span>${state.score}</span></div>
      </div>
      <div class="progress-bar"><div class="progress-fill" style="width:${(idx/8)*100}%"></div></div>
      <div class="question-box">Q${idx+1}. ${q.q}</div>
      <div class="options-grid">
        ${opts.map(o => `<button class="option-btn" onclick="checkTrivia(this,'${o.replace(/'/g,"\\'")}','${q.a.replace(/'/g,"\\'")}','${subject}')">${o}</button>`).join('')}
      </div>
      <div id="fb"></div>
    `);
  }

  window.checkTrivia = function(btn, chosen, correct, subject) {
    document.querySelectorAll('.option-btn').forEach(b => b.disabled = true);
    if (chosen === correct) {
      btn.classList.add('correct');
      state.score += 10;
      document.getElementById('fb').innerHTML = '<div class="feedback correct-fb">✅ That\'s right! +10</div>';
    } else {
      btn.classList.add('wrong');
      document.querySelectorAll('.option-btn').forEach(b => { if(b.textContent.trim()===correct) b.classList.add('correct'); });
      document.getElementById('fb').innerHTML = `<div class="feedback wrong-fb">❌ Answer: <b>${correct}</b></div>`;
    }
    idx++;
    setTimeout(render, 1500);
  };

  render();
}

// ===== SPELLING QUIZ =====
function playSpellingQuiz() {
  const ageKey = state.ageFilter === 'all' ? '68' : state.ageFilter;
  const wordList = shuffle(getWords(ageKey));
  let idx = 0;

  function render() {
    if (idx >= Math.min(wordList.length, 10)) { showResults(); return; }
    const word = wordList[idx];
    const hint = word.split('').map((c,i) => i===0||i===word.length-1 ? c : '_').join(' ');
    html(`
      <div class="game-header">
        <button class="btn btn-ghost" onclick="goHome()">← Back</button>
        <div class="game-title">🐝 Spelling Bee</div>
        <div class="score-box">⭐ <span>${state.score}</span></div>
      </div>
      <div class="progress-bar"><div class="progress-fill" style="width:${(idx/10)*100}%"></div></div>
      <div class="question-box" style="text-align:center">
        <div style="font-size:0.9rem;color:var(--muted);margin-bottom:10px">Spell this word:</div>
        <div style="font-family:Fredoka One;font-size:3rem;color:var(--accent2);letter-spacing:0.2em">${hint}</div>
        <div style="color:var(--muted);font-size:0.85rem;margin-top:8px">${word.length} letters</div>
      </div>
      <input class="word-input" id="spell-ans" placeholder="Type the word..." autofocus
        onkeydown="if(event.key==='Enter')checkSpell('${word}')">
      <div style="text-align:center">
        <button class="btn btn-primary" onclick="checkSpell('${word}')">✅ Check</button>
      </div>
      <div id="fb"></div>
    `);
  }

  window.checkSpell = function(word) {
    const ans = (document.getElementById('spell-ans')?.value || '').trim().toLowerCase();
    if (ans === word.toLowerCase()) {
      state.score += 12;
      document.getElementById('fb').innerHTML = '<div class="feedback correct-fb">🐝 Correct! +12</div>';
    } else {
      document.getElementById('fb').innerHTML = `<div class="feedback wrong-fb">❌ It was: <b>${word}</b></div>`;
    }
    idx++;
    setTimeout(render, 1300);
  };

  render();
}

// ===== MEMORY MATCH =====
function playMemoryMatch() {
  const ageKey = state.ageFilter === 'K2' ? 'K2' : '35';
  const words = shuffle(getWords(ageKey)).slice(0, 6);
  const pairs = shuffle([...words.map(w=>({id:w+'_a',word:w,type:'word'})), ...words.map(w=>({id:w+'_b',word:w.toUpperCase(),type:'match'}))]);
  let flipped = [], matched = new Set(), moves = 0;

  function render() {
    html(`
      <div class="game-header">
        <button class="btn btn-ghost" onclick="goHome()">← Back</button>
        <div class="game-title">🃏 Memory Match</div>
        <div class="score-box">Moves: <span>${moves}</span></div>
      </div>
      <div style="text-align:center;color:var(--muted);margin-bottom:15px">Match the word pairs!</div>
      <div class="memory-grid" id="mem-grid">
        ${pairs.map(c => `
          <div class="memory-card ${matched.has(c.id.replace(/_[ab]$/,'')) ? 'matched flipped' : ''}" id="mc-${c.id}" onclick="flipCard('${c.id}')">
            <div class="front"><span style="font-size:1.5rem">📝</span>${c.word}</div>
            <div class="back">❓</div>
          </div>`).join('')}
      </div>
      <div id="fb" style="text-align:center;margin-top:15px"></div>
    `);
  }

  window.flipCard = function(cardId) {
    const base = cardId.replace(/_[ab]$/, '');
    if (matched.has(base) || flipped.length >= 2 || flipped.some(f=>f.id===cardId)) return;
    const card = document.getElementById('mc-'+cardId);
    if (!card || card.classList.contains('flipped')) return;
    card.classList.add('flipped');
    flipped.push({ id: cardId, base });
    if (flipped.length === 2) {
      moves++;
      document.querySelectorAll('.score-box span').forEach(s=>s.textContent=moves);
      if (flipped[0].base === flipped[1].base) {
        matched.add(flipped[0].base);
        state.score += 20;
        flipped = [];
        if (matched.size === words.length) setTimeout(showResults, 600);
      } else {
        setTimeout(() => {
          flipped.forEach(f => {
            const el = document.getElementById('mc-'+f.id);
            if (el) el.classList.remove('flipped');
          });
          flipped = [];
        }, 900);
      }
    }
  };

  render();
}

// ===== NUMBER POP (K2) =====
function playNumberPop() {
  const problems = [{q:'1+1',a:2},{q:'2+2',a:4},{q:'3+1',a:4},{q:'2+3',a:5},{q:'4+1',a:5},{q:'1+3',a:4},{q:'5+1',a:6},{q:'3+3',a:6}];
  let idx = 0;

  function render() {
    if (idx >= problems.length) { showResults(); return; }
    const p = problems[idx];
    const correct = p.a;
    const opts = shuffle([correct, correct+1, correct-1, correct+2].filter(n=>n>0).slice(0,4));
    html(`
      <div class="game-header">
        <button class="btn btn-ghost" onclick="goHome()">← Back</button>
        <div class="game-title">💥 Number Pop</div>
        <div class="score-box">⭐ <span>${state.score}</span></div>
      </div>
      <div style="text-align:center;padding:20px">
        <div style="font-size:1.2rem;color:var(--muted);margin-bottom:10px">Pop the right bubble!</div>
        <div class="math-problem" style="font-size:4rem">${p.q} = ?</div>
        <div style="display:flex;gap:20px;justify-content:center;flex-wrap:wrap;margin-top:20px">
          ${opts.map(o => `
            <div onclick="popBubble(this,${o},${correct})"
              style="width:90px;height:90px;border-radius:50%;background:radial-gradient(circle at 30% 30%, rgba(255,255,255,0.3), transparent), var(--accent${Math.ceil(Math.random()*4)});display:flex;align-items:center;justify-content:center;font-family:Fredoka One;font-size:2.5rem;cursor:pointer;transition:all 0.2s;box-shadow:0 8px 20px rgba(0,0,0,0.3)"
              onmouseover="this.style.transform='scale(1.1)'" onmouseout="this.style.transform='scale(1)'">${o}</div>
          `).join('')}
        </div>
      </div>
      <div id="fb" style="text-align:center;margin-top:10px"></div>
    `);
  }

  window.popBubble = function(el, chosen, correct) {
    if (chosen === correct) {
      el.style.transform = 'scale(2)'; el.style.opacity = '0';
      state.score += 10;
      document.getElementById('fb').innerHTML = '<div class="feedback correct-fb">💥 POP! +10</div>';
    } else {
      el.style.background = 'var(--accent1)';
      document.getElementById('fb').innerHTML = `<div class="feedback wrong-fb">❌ Answer was <b>${correct}</b></div>`;
    }
    idx++;
    setTimeout(render, 1200);
  };

  render();
}

// ===== WORD BUILDER =====
function playWordBuilder() {
  const letters = ['A','T','E','S','R','N','I','O','L','C'];
  const targets = ['LION','STIR','TONE','REAL','SCAN','CORE','TENT','COAT','ROLE','SNORE'];
  let found = new Set(), input = '', timeLeft = 90;

  function render() {
    html(`
      <div class="game-header">
        <button class="btn btn-ghost" onclick="goHome()">← Back</button>
        <div class="game-title">🧱 Word Builder</div>
        <div class="score-box">⭐ <span>${state.score}</span></div>
      </div>
      <div class="timer-ring" id="wb-timer">${timeLeft}s</div>
      <div style="text-align:center;color:var(--muted);margin-bottom:12px">Make words using these letters:</div>
      <div style="display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-bottom:20px">
        ${letters.map(l=>`<div style="width:48px;height:48px;background:var(--accent4);border-radius:10px;display:flex;align-items:center;justify-content:center;font-family:Fredoka One;font-size:1.8rem;color:#000;cursor:pointer" onclick="addLetter('${l}')">${l}</div>`).join('')}
      </div>
      <input class="word-input" id="wb-input" style="font-size:2rem;letter-spacing:0.3em" readonly placeholder="Click letters or type..." value="${input}">
      <div style="display:flex;gap:10px;justify-content:center;margin:10px 0">
        <button class="btn btn-primary" onclick="submitWBWord()">✅ Submit</button>
        <button class="btn btn-ghost" onclick="clearWBInput()">🗑 Clear</button>
      </div>
      <div style="color:var(--muted);font-size:0.85rem;text-align:center;margin-bottom:10px">Words found: <b style="color:var(--accent3)">${found.size}</b></div>
      <div style="display:flex;flex-wrap:wrap;gap:8px;justify-content:center">
        ${[...found].map(w=>`<div style="background:rgba(107,203,119,0.2);border:2px solid var(--accent3);border-radius:8px;padding:4px 12px;font-weight:800">${w}</div>`).join('')}
      </div>
      <div id="fb" style="text-align:center;margin-top:10px"></div>
    `);

    document.getElementById('wb-input').addEventListener('input', e => { input = e.target.value.toUpperCase(); });
  }

  window.addLetter = function(l) {
    input += l;
    const el = document.getElementById('wb-input');
    if (el) el.value = input;
  };
  window.clearWBInput = function() {
    input = '';
    const el = document.getElementById('wb-input');
    if (el) el.value = '';
  };
  window.submitWBWord = function() {
    const word = input.toUpperCase().trim();
    if (!word || word.length < 3) { document.getElementById('fb').innerHTML = '<div class="feedback wrong-fb">Too short!</div>'; return; }
    if (found.has(word)) { document.getElementById('fb').innerHTML = '<div class="feedback wrong-fb">Already found!</div>'; input=''; document.getElementById('wb-input').value=''; return; }
    if (targets.includes(word)) {
      found.add(word); state.score += word.length * 5;
      document.getElementById('fb').innerHTML = `<div class="feedback correct-fb">🧱 +${word.length*5}!</div>`;
    } else {
      document.getElementById('fb').innerHTML = '<div class="feedback wrong-fb">Not in word list</div>';
    }
    input = '';
    setTimeout(render, 800);
  };

  clearInterval(state.timer);
  state.timer = setInterval(() => {
    timeLeft--;
    const td = document.getElementById('wb-timer');
    if (td) td.textContent = timeLeft + 's';
    if (timeLeft <= 0) { clearInterval(state.timer); showResults(); }
  }, 1000);

  render();
}

// ===== RESULTS =====
function showResults() {
  clearInterval(state.timer);
  const msgs = ['Keep practicing! 💪','Good effort! 🌟','Nice work! 🎉','Great job! 🔥','Amazing! 🏆','PERFECT! 🎓'];
  const msg = state.score >= 100 ? msgs[5] : state.score >= 80 ? msgs[4] : state.score >= 60 ? msgs[3] : state.score >= 40 ? msgs[2] : state.score >= 20 ? msgs[1] : msgs[0];

  html(`
    <div class="results-box">
      <div style="font-size:4rem">🎓</div>
      <div class="big-score">${state.score}</div>
      <p>points earned</p>
      <div style="font-family:Fredoka One;font-size:1.5rem;color:var(--accent3);margin-bottom:20px">${msg}</div>
      <div style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap">
        <button class="btn btn-primary" onclick="startGame('${state.currentGame}')">🔄 Play Again</button>
        <button class="btn btn-ghost" onclick="goHome()">🏠 Home</button>
      </div>
    </div>
  `);
}

// ===== INIT =====
renderHome();
</script>
